name: SSH Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Show Secret Presence
        run: |
          echo "HOST='${{ secrets.EC2_HOST }}'"
          echo "USER='${{ secrets.EC2_USER }}'"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Verify SSH Key
        run: |
          ls -la ~/.ssh
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          echo "SSH key is valid"

      - name: Test DNS Resolution
        run: |
          nslookup ${{ secrets.EC2_HOST }} || true

      - name: Test Port 22
        run: |
          nc -zv ${{ secrets.EC2_HOST }} 22

      - name: Show Host Key
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} || true

      - name: SSH Verbose Debug
        run: |
          ssh -vvv \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "hostname && whoami && pwd"
